<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affiliate Intake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#050505;
      --panel:rgba(255,255,255,0.06);
      --panel-2:rgba(255,255,255,0.04);
      --border:rgba(255,255,255,0.10);
      --border-strong:rgba(255,255,255,0.16);
      --text:#f5f5f5;
      --muted:#9b9b9f;
      --input:rgba(255,255,255,0.045);
      --input-focus:rgba(255,255,255,0.08);
      --button:#ffffff;
      --button-text:#050505;
      --radius:20px;
      --radius-sm:14px;
      --shadow:0 20px 60px rgba(0,0,0,0.45);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 30%), #050505;
      color:var(--text);
      font-family:"Inter", sans-serif;
      min-height:100%;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:100%;
      max-width:760px;
    }

    .card{
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      border:1px solid var(--border);
      border-radius:28px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
      padding:22px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:18px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .title h1{
      margin:0;
      font-size:20px;
      font-weight:700;
      letter-spacing:-0.03em;
    }

    .title p{
      margin:0;
      font-size:13px;
      color:var(--muted);
    }

    .lang{
      min-width:180px;
    }

    label{
      display:block;
      font-size:12px;
      font-weight:600;
      color:#f0f0f0;
      margin-bottom:8px;
      letter-spacing:.02em;
    }

    form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .field{
      display:flex;
      flex-direction:column;
    }

    .field.full{
      grid-column:1 / -1;
    }

    input,
    select,
    textarea{
      width:100%;
      border:1px solid var(--border);
      background:var(--input);
      color:var(--text);
      border-radius:16px;
      padding:14px 15px;
      font:inherit;
      outline:none;
      transition:.2s ease;
    }

    input::placeholder,
    textarea::placeholder{
      color:#7f7f85;
    }

    input:focus,
    select:focus,
    textarea:focus{
      background:var(--input-focus);
      border-color:var(--border-strong);
    }

    select{
      appearance:none;
      -webkit-appearance:none;
      background-image:
        linear-gradient(45deg, transparent 50%, #bcbcbc 50%),
        linear-gradient(135deg, #bcbcbc 50%, transparent 50%);
      background-position:
        calc(100% - 20px) calc(50% - 3px),
        calc(100% - 14px) calc(50% - 3px);
      background-size:6px 6px, 6px 6px;
      background-repeat:no-repeat;
      padding-right:40px;
    }

    textarea{
      min-height:170px;
      resize:vertical;
      line-height:1.55;
    }

    .actions{
      grid-column:1 / -1;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font:inherit;
      font-weight:600;
      cursor:pointer;
      transition:.2s ease;
    }

    .primary{
      background:var(--button);
      color:var(--button-text);
    }

    .primary:hover{
      opacity:.92;
    }

    .secondary{
      background:rgba(255,255,255,0.06);
      color:var(--text);
      border:1px solid var(--border);
    }

    .secondary:hover{
      background:rgba(255,255,255,0.09);
    }

    .rtl{
      direction:rtl;
      text-align:right;
    }

    @media (max-width:720px){
      body{
        padding:14px;
      }

      .topbar{
        flex-direction:column;
      }

      .lang{
        width:100%;
        min-width:0;
      }

      form{
        grid-template-columns:1fr;
      }

      .actions{
        flex-direction:column;
      }

      .actions button{
        width:100%;
      }
    }
  </style>
</head>

  <div class="wrap">
    <div class="card" id="app">
      <div class="topbar">

        </div>

        <div class="lang">

            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>

            <option value="nl">Nederlands</option>
            <option value="ru">Русский</option>

        </div>
      </div>

      <form id="telegramForm">
        <div class="field">
          <label for="plan" data-i18n="planLabel">Plan</label>
          <select id="plan" name="plan">
            <option value="Standard">Standard</option>
            <option value="Centurion">Centurion</option>
          </select>
        </div>

        <div class="field">
          <label for="name" data-i18n="nameLabel">Name *</label>
          <input id="name" name="name" type="text" placeholder="Name" required />
        </div>

        <div class="field">
          <label for="telegramId" data-i18n="telegramIdLabel">Telegram ID *</label>
          <input id="telegramId" name="telegramId" type="text" placeholder="123456789" required />
        </div>

        <div class="field">
          <label for="phone" data-i18n="phoneLabel">Phone *</label>
          <input id="phone" name="phone" type="tel" placeholder="+34..." required />
        </div>

        <div class="field">
          <label for="email" data-i18n="emailLabel">E-Mail</label>
          <input id="email" name="email" type="email" placeholder="email@example.com" />
        </div>

        <div class="field">
          <label for="language" data-i18n="languageLabel">Language</label>
          <select id="language" name="language">
            <option value="EN">EN</option>
            <option value="ES">ES</option>
            <option value="DE">DE</option>
            <option value="FR">FR</option>
            <option value="IT">IT</option>
            <option value="NL">NL</option>
            <option value="RU">RU</option>
            <option value="AR">AR</option>
          </select>
        </div>

        <div class="field">
          <label for="role" data-i18n="roleLabel">Role *</label>
          <select id="role" name="role" required>
            <option value="Security">Security</option>
            <option value="Hotel Concierge">Hotel Concierge</option>
            <option value="Barkeeper">Barkeeper</option>
            <option value="Promoter">Promoter</option>
            <option value="Taxifahrer">Taxifahrer</option>
            <option value="Sonstiges">Sonstiges</option>
          </select>
        </div>

        <div class="field">
          <label for="location" data-i18n="locationLabel">Location</label>
          <input id="location" name="location" type="text" placeholder="Location" />
        </div>

        <div class="field">
          <label for="commissionModel" data-i18n="commissionModelLabel">Commission model</label>
          <select id="commissionModel" name="commissionModel">
            <option value="Standard">Standard</option>
            <option value="Individual">Individual</option>
          </select>
        </div>

        <div class="field">
          <label for="ownCommission" data-i18n="ownCommissionLabel">Own commission € *</label>
          <input id="ownCommission" name="ownCommission" type="number" min="0" step="0.01" value="20" required />
        </div>

        <div class="field">
          <label for="paymentMethod" data-i18n="paymentMethodLabel">Payment method *</label>
          <select id="paymentMethod" name="paymentMethod" required>
            <option value="Revolut">Revolut</option>
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="PayPal">PayPal</option>
            <option value="Cash">Cash</option>
            <option value="Bizum">Bizum</option>
          </select>
        </div>

        <div class="field full">
          <label for="paymentDetail" data-i18n="paymentDetailLabel">Payment detail *</label>
          <input id="paymentDetail" name="paymentDetail" type="text" placeholder="IBAN / @user / PayPal" required />
        </div>

        <div class="field full">
          <label for="preview" data-i18n="previewLabel">Preview</label>
          <textarea id="preview" readonly></textarea>
        </div>

        <div class="actions">
          <button type="submit" class="primary" id="submitBtn">Open Telegram</button>
          <button type="button" class="secondary" id="copyBtn">Copy</button>
        </div>
      </form>
    </div>
  </div>

    function currentLang() {
      return uiLanguage.value || "en";
    }

    function t() {
      return translations[currentLang()];
    }

    function updateUIText() {
      const dict = t();
      const isRTL = currentLang() === "ar";

      document.documentElement.lang = currentLang();
      document.documentElement.dir = isRTL ? "rtl" : "ltr";
      app.classList.toggle("rtl", isRTL);

      document.getElementById("title").textContent = dict.title;
      document.getElementById("subtitle").textContent = dict.subtitle;
      document.getElementById("uiLanguageLabel").textContent = dict.uiLanguageLabel;
      document.getElementById("submitBtn").textContent = dict.submitBtn;
      document.getElementById("copyBtn").textContent = dict.copyBtn;

      document.querySelector('[data-i18n="planLabel"]').textContent = dict.planLabel;
      document.querySelector('[data-i18n="nameLabel"]').textContent = dict.nameLabel;
      document.querySelector('[data-i18n="telegramIdLabel"]').textContent = dict.telegramIdLabel;
      document.querySelector('[data-i18n="phoneLabel"]').textContent = dict.phoneLabel;
      document.querySelector('[data-i18n="emailLabel"]').textContent = dict.emailLabel;
      document.querySelector('[data-i18n="languageLabel"]').textContent = dict.languageLabel;
      document.querySelector('[data-i18n="roleLabel"]').textContent = dict.roleLabel;
      document.querySelector('[data-i18n="locationLabel"]').textContent = dict.locationLabel;
      document.querySelector('[data-i18n="commissionModelLabel"]').textContent = dict.commissionModelLabel;
      document.querySelector('[data-i18n="ownCommissionLabel"]').textContent = dict.ownCommissionLabel;
      document.querySelector('[data-i18n="paymentMethodLabel"]').textContent = dict.paymentMethodLabel;
      document.querySelector('[data-i18n="paymentDetailLabel"]').textContent = dict.paymentDetailLabel;
      document.querySelector('[data-i18n="previewLabel"]').textContent = dict.previewLabel;

      document.getElementById("name").placeholder = dict.placeholders.name;
      document.getElementById("telegramId").placeholder = dict.placeholders.telegramId;
      document.getElementById("phone").placeholder = dict.placeholders.phone;
      document.getElementById("email").placeholder = dict.placeholders.email;
      document.getElementById("location").placeholder = dict.placeholders.location;
      document.getElementById("paymentDetail").placeholder = dict.placeholders.paymentDetail;

      updatePreview();
    }

    function getMessage() {
      const data = new FormData(form);
      const dict = t().fields;

      return [

        "",
        `${dict.plan}: ${data.get("plan") || ""}`,
        `${dict.name}: ${data.get("name") || ""}`,
        `${dict.telegramId}: ${data.get("telegramId") || ""}`,
        `${dict.phone}: ${data.get("phone") || ""}`,
        `${dict.email}: ${data.get("email") || ""}`,
        `${dict.language}: ${data.get("language") || ""}`,
        `${dict.role}: ${data.get("role") || ""}`,
        `${dict.location}: ${data.get("location") || ""}`,
        `${dict.commissionModel}: ${data.get("commissionModel") || ""}`,
        `${dict.ownCommission}: ${data.get("ownCommission") || ""}`,
        `${dict.paymentMethod}: ${data.get("paymentMethod") || ""}`,
        `${dict.paymentDetail}: ${data.get("paymentDetail") || ""}`
      ].join("\n");
    }

    function updatePreview() {
      preview.value = getMessage();
    }

    form.addEventListener("input", updatePreview);
    form.addEventListener("change", updatePreview);
    uiLanguage.addEventListener("change", updateUIText);

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      if (!form.reportValidity()) return;

      const encoded = encodeURIComponent(getMessage());
      const tgDeepLink = `tg://resolve?domain=invictuzzzzz&text=${encoded}`;
      const webFallback = `https://t.me/invictuzzzzz?text=${encoded}`;

      window.location.href = tgDeepLink;
      setTimeout(() => {
        window.open(webFallback, "_blank");
      }, 700);
    });

    copyBtn.addEventListener("click", async function() {
      try {
        await navigator.clipboard.writeText(getMessage());
        const oldText = t().copyBtn;
        copyBtn.textContent = t().copied;
        setTimeout(() => {
          copyBtn.textContent = oldText;
        }, 1200);
      } catch {}
    });

    updateUIText();
  </script>
</body>
</html>
